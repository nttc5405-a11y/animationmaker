<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>火場案件回顧系統</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; user-select: none; touch-action: manipulation; }

        .sector-btn {
            border-radius: 1rem; border-width: 2px;
            min-height: 70px; padding: 8px;
            position: relative; overflow: hidden;
            transition: box-shadow 0.3s;
        }
        .bg-inside   { background-color: #111827; border-color: #374151; }
        .bg-outside  { background-color: #064e3b; border-color: #065f46; }
        .bg-rit      { background-color: #450a0a; border-color: #991b1b; border-style: dashed; }
        .bg-basement { background-color: #1f2937; border-color: #4b5563; }
        .bg-staging  { background-color: #0f172a; border-color: #3b82f6; border-style: dashed; }

        .team-card {
            background-color: rgba(0,0,0,0.88);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 8px; padding: 4px 7px;
            margin-top: 4px; font-size: 11px;
            animation: cardIn 0.25s ease;
        }
        @keyframes cardIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

        .task-tag { padding: 1px 5px; border-radius: 4px; color: white; font-weight: 900; font-size: 9px; margin-right: 3px; vertical-align: middle; }
        .task-滅 { background-color: #ef4444; } .task-搜 { background-color: #f97316; }
        .task-排 { background-color: #06b6d4; } .task-周 { background-color: #3b82f6; }
        .task-侷 { background-color: #10b981; } .task-殘 { background-color: #92400e; }
        .task-幕 { background-color: #a855f7; } .task-RIT { background-color: #ff0000; border: 1px solid white; }
        .task-待 { background-color: #64748b; border: 1px dashed white; }

        .grid-layout {
            display: grid;
            grid-template-columns: 80px 1fr 80px;
            gap: 8px; width: 100%;
        }

        /* ── 時間軸事件顏色 ── */
        .ev-管制指派 { border-left-color: #3b82f6 !important; }
        .ev-位置變更 { border-left-color: #8b5cf6 !important; }
        .ev-安全撤出 { border-left-color: #10b981 !important; }
        .ev-徹底收隊 { border-left-color: #6b7280 !important; }
        .ev-壓力更新 { border-left-color: #06b6d4 !important; }
        .ev-小組更新 { border-left-color: #f59e0b !important; }
        .ev-氣量警告 { border-left-color: #f97316 !important; }
        .ev-緊急回撤 { border-left-color: #ef4444 !important; }
        .ev-MAYDAY   { border-left-color: #ff0000 !important; background-color: rgba(239,68,68,0.12) !important; }
        .ev-定期回報 { border-left-color: #60a5fa !important; }
        .ev-案件結束 { border-left-color: #94a3b8 !important; }
        .ev-人員報到 { border-left-color: #34d399 !important; }
        .ev-current {
            background-color: rgba(59,130,246,0.18) !important;
            border-left-width: 4px !important;
        }

        @keyframes mayday-flash { 0%,100%{background-color:#020617;} 50%{background-color:#3b0a0a;} }
        body.mayday-active { animation: mayday-flash 1.2s infinite; }

        #progress-slider {
            -webkit-appearance: none; width: 100%; height: 6px;
            border-radius: 999px; background: #1e293b; outline: none; cursor: pointer;
        }
        #progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            border-radius: 50%; background: #3b82f6; cursor: pointer;
        }
        .speed-btn {
            padding: 5px 14px; border-radius: 8px; font-weight: 900;
            font-size: 12px; transition: all 0.15s; border: none; cursor: pointer;
        }
        .speed-btn.active  { background-color: #3b82f6; color: white; }
        .speed-btn:not(.active) { background-color: #1e293b; color: #94a3b8; }
        #timeline-list { scrollbar-width: thin; scrollbar-color: #334155 #0f172a; }
        #timeline-list::-webkit-scrollbar { width: 4px; }
        #timeline-list::-webkit-scrollbar-track { background: #0f172a; }
        #timeline-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

        .sector-flash { box-shadow: 0 0 18px rgba(139,92,246,0.8) !important; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col" onclick="initAudio()">

<!-- ════════════════════════════════════════
     STEP 1：貼上資料畫面
════════════════════════════════════════ -->
<div id="paste-view" class="flex flex-col items-center justify-center h-full p-6 gap-5 overflow-y-auto">
    <div class="text-center">
        <h1 class="text-3xl font-black text-red-500 italic tracking-tight">🔍 案件回顧系統</h1>
        <p class="text-slate-400 text-sm mt-1 font-bold uppercase tracking-widest">Incident Replay</p>
    </div>

    <div class="w-full max-w-2xl bg-slate-900 rounded-3xl border border-slate-700 p-6 shadow-2xl space-y-5">

        <!-- 步驟說明 -->
        <div class="bg-slate-950 rounded-2xl p-4 border border-slate-800 space-y-2">
            <p class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">操作步驟</p>
            <div class="flex gap-3 items-start">
                <span class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 mt-0.5">1</span>
                <p class="text-xs text-slate-300">開啟 <b class="text-blue-400">Google 試算表</b> → 點選欲回顧的<b class="text-blue-400">案件分頁</b></p>
            </div>
            <div class="flex gap-3 items-start">
                <span class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 mt-0.5">2</span>
                <p class="text-xs text-slate-300">全選儲存格 <kbd class="bg-slate-800 px-1.5 py-0.5 rounded text-slate-400">Ctrl+A</kbd> → 複製 <kbd class="bg-slate-800 px-1.5 py-0.5 rounded text-slate-400">Ctrl+C</kbd></p>
            </div>
            <div class="flex gap-3 items-start">
                <span class="w-6 h-6 bg-blue-600 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 mt-0.5">3</span>
                <p class="text-xs text-slate-300">貼入下方欄位 <kbd class="bg-slate-800 px-1.5 py-0.5 rounded text-slate-400">Ctrl+V</kbd> → 點擊「<b class="text-blue-400">載入回顧</b>」</p>
            </div>

        <textarea id="paste-area"
            class="w-full h-36 bg-slate-950 border border-slate-700 rounded-xl p-3 text-xs font-mono text-slate-300 resize-none outline-none focus:border-blue-500 transition-colors"
            placeholder="時間&#9;動作&#9;詳情&#9;現場總數&#9;待命人數&#9;熱區部署&#10;09:03:21&#9;管制指派&#9;🚀 [1F] 指派：王大明、李小華 (滅火攻擊) (氣壓:250b)&#9;2&#9;0&#9;2&#10;..."></textarea>

        <div id="paste-error" class="hidden text-red-400 text-xs font-bold px-1"></div>

        <button onclick="loadData()"
            class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl text-base active:scale-95 transition-all shadow-lg shadow-blue-900/50">
            ▶ 載入回顧
        </button>
    </div>
</div>

<!-- ════════════════════════════════════════
     STEP 2：回顧播放畫面
════════════════════════════════════════ -->
<div id="replay-view" class="hidden flex-col h-full">

    <!-- Top bar -->
    <div class="bg-slate-950 border-b border-slate-800 px-3 py-2 flex items-center gap-3 shrink-0">
        <button onclick="resetToInput()" class="px-3 py-1.5 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-black text-slate-400 transition-colors active:scale-95 shrink-0">← 返回</button>
        <div class="flex-1 min-w-0">
            <h1 id="case-title" class="text-sm font-black text-red-400 italic truncate">─</h1>
            <p id="time-range" class="text-[10px] text-slate-500 font-bold"></p>
        </div>
        <div id="mayday-banner" class="hidden px-3 py-1 bg-red-600 rounded-lg text-xs font-black text-white animate-pulse shrink-0">🚨 MAYDAY</div>
        <div class="flex gap-3 shrink-0">
            <div class="text-center"><div id="stat-total"    class="text-blue-400   font-black font-mono text-lg leading-none">0</div><div class="text-[9px] text-slate-500 font-black">現場</div></div>
            <div class="text-center"><div id="stat-standby"  class="text-emerald-400 font-black font-mono text-lg leading-none">0</div><div class="text-[9px] text-slate-500 font-black">待命</div></div>
            <div class="text-center"><div id="stat-deployed" class="text-red-400    font-black font-mono text-lg leading-none">0</div><div class="text-[9px] text-slate-500 font-black">熱區</div></div>
        </div>
    </div>

    <!-- Main area: map + timeline -->
    <div class="flex-1 flex overflow-hidden">

        <!-- Map -->
        <div class="flex-1 overflow-y-auto p-3 flex items-start justify-center">
            <div id="map-grid" class="grid-layout w-full max-w-lg"></div>
        </div>

        <!-- Timeline panel -->
        <div class="w-64 border-l border-slate-800 flex flex-col bg-slate-900/40 shrink-0">
            <div class="px-3 py-2 border-b border-slate-800 bg-slate-950 flex justify-between items-center">
                <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest">📋 事件時間軸</p>
                <p id="event-counter" class="text-[10px] text-slate-500 font-mono">─</p>
            </div>
            <div id="timeline-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        </div>
    </div>

    <!-- Controls -->
    <div class="bg-slate-950 border-t border-slate-800 px-4 py-3 shrink-0 space-y-2">
        <!-- Progress -->
        <div class="flex items-center gap-3">
            <span id="current-time" class="text-blue-400 font-mono font-black text-sm w-16 shrink-0">--:--:--</span>
            <input type="range" id="progress-slider" min="0" value="0" step="1" oninput="seekTo(parseInt(this.value))">
            <span id="event-index-display" class="text-slate-500 font-mono text-xs w-16 text-right shrink-0">─</span>
        </div>
        <!-- Buttons -->
        <div class="flex items-center justify-center gap-2 flex-wrap">
            <button onclick="goToStart()"   class="w-10 h-10 bg-slate-800 hover:bg-slate-700 rounded-xl text-white font-black transition-colors active:scale-95">⏮</button>
            <button onclick="stepBack()"    class="w-10 h-10 bg-slate-800 hover:bg-slate-700 rounded-xl text-white font-black transition-colors active:scale-95">◀</button>
            <button id="play-btn" onclick="togglePlay()" class="w-14 h-10 bg-blue-600 hover:bg-blue-500 rounded-xl text-white font-black text-lg transition-colors active:scale-95">▶</button>
            <button onclick="stepForward()" class="w-10 h-10 bg-slate-800 hover:bg-slate-700 rounded-xl text-white font-black transition-colors active:scale-95">▶</button>
            <button onclick="goToEnd()"     class="w-10 h-10 bg-slate-800 hover:bg-slate-700 rounded-xl text-white font-black transition-colors active:scale-95">⏭</button>
            <div class="flex gap-1 ml-2">
                <button onclick="setSpeed(1)"  id="spd-1"  class="speed-btn active">1×</button>
                <button onclick="setSpeed(2)"  id="spd-2"  class="speed-btn">2×</button>
                <button onclick="setSpeed(5)"  id="spd-5"  class="speed-btn">5×</button>
                <button onclick="setSpeed(10)" id="spd-10" class="speed-btn">10×</button>
            </div>
        </div>
    </div>
</div>

<!-- ════════════════════════════════════════
     JavaScript
════════════════════════════════════════ -->
<script>
// ── 常數 ────────────────────────────────
const TASK_SHORT = {
    '滅火攻擊':'滅','人命搜救':'搜','通風排煙':'排','周界防護':'周',
    '侷限火勢':'侷','殘火處理':'殘','幕僚作業':'幕','RIT':'RIT','待命集結':'待'
};
const EV_ICON = {
    '管制指派':'🚀','位置變更':'📍','安全撤出':'🔙','徹底收隊':'👋',
    '壓力更新':'📲','氣量警告':'⚠️','緊急回撤':'🆘','MAYDAY':'🚨',
    '定期回報':'⏳','案件結束':'🛑','人員報到':'✅','小組更新':'🔄',
    '指揮權轉移':'🔥','衝突偵測':'🔍','同步警告':'⚠️','系統':'🔧','系統建置':'🔧',
};
const OUTSIDE_SECS = ['第三面(後)','第二面(左)','第四面(右)','第一面(前)'];

// ── 全域狀態 ────────────────────────────
let events    = [];
let snapshots = [];
let currentIdx = 0;
let isPlaying  = false;
let playSpeed  = 1;
let playTimer  = null;
let allSectors = [];
let _uidCnt    = 0;

// ── Audio (可選，點擊頁面後初始化) ────────
let audioCtx;
function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function beep(freq, dur, vol=0.08) {
    if (!audioCtx) return;
    try {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.value = freq;
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + dur);
    } catch(e){}
}

// ── CSV / Tab 解析 ───────────────────────
function parseRaw(text) {
    const lines = text.trim().split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return null;
    const isTsv = lines[0].includes('\t');

    function splitLine(line) {
        if (isTsv) return line.split('\t').map(f => f.trim());
        const res = []; let field = '', inQ = false;
        for (const ch of line) {
            if (ch === '"') { inQ = !inQ; }
            else if (ch === ',' && !inQ) { res.push(field); field = ''; }
            else { field += ch; }
        }
        res.push(field);
        return res.map(f => f.replace(/^"|"$/g,'').trim());
    }

    const rows = lines.map(splitLine);
    const start = (rows[0][0] === '時間' || rows[0][1] === '動作') ? 1 : 0;
    return rows.slice(start)
        .filter(r => r.length >= 3 && r[0] && r[1])
        .map(r => ({
            time:     r[0] || '',
            action:   r[1] || '',
            msg:      r[2] || '',
            total:    parseInt(r[3]) || 0,
            standby:  parseInt(r[4]) || 0,
            deployed: parseInt(r[5]) || 0,
        }));
}

// ── 狀態機 ──────────────────────────────
function clone(s) { return JSON.parse(JSON.stringify(s)); }

function findTeam(teams, str) {
    const names = str.split(/[、，,]/).map(s => s.trim()).filter(Boolean);
    for (const uid in teams) {
        const t = teams[uid];
        if (!t.active) continue;
        if (names.some(n => t.members.includes(n))) return t;
    }
    return null;
}

function applyEvent(state, ev) {
    state = clone(state);
    const { action, msg } = ev;

    if (action === '管制指派') {
        // 🚀 [location] 指派：m1、m2 (task) (氣壓:Xb)
        const m = msg.match(/\[(.+?)\]\s*指派[：:]\s*(.+?)\s*[（(]([^)）]+)[)）](?:.*?氣壓[:：](\d+)b)?/);
        if (m) {
            const members = m[2].split(/[、，]/).map(s => s.trim()).filter(Boolean);
            const uid = 'T' + (++_uidCnt);
            state.teams[uid] = { uid, members, leader: members[0], location: m[1], task: m[3], air: m[4] ? +m[4] : null, active: true };
        }
    } else if (action === '位置變更') {
        // 📍 members：[from] ➔ [to]
        const m = msg.match(/(.+?)[：:]\s*\[(.+?)\]\s*[➔→▶]\s*\[(.+?)\]/);
        if (m) { const t = findTeam(state.teams, m[1]); if (t) t.location = m[3]; }
    } else if (action === '安全撤出') {
        // 🔙 members 從 [from] 撤出至 [待命區]
        const m = msg.match(/(.+?)\s*從\s*\[/);
        if (m) { const t = findTeam(state.teams, m[1]); if (t) { t.location = '待命區'; t.air = null; t.task = '待命集結'; } }
    } else if (action === '徹底收隊') {
        // 👋 members 已從現場移除
        const m = msg.match(/(.+?)\s*已從現場移除/);
        if (m) { const t = findTeam(state.teams, m[1]); if (t) t.active = false; }
    } else if (action === '壓力更新') {
        // 📲 members 更新氣壓為 Xb
        const m = msg.match(/(.+?)\s*更新氣壓為\s*(\d+)b/);
        if (m) { const t = findTeam(state.teams, m[1]); if (t) t.air = +m[2]; }
    } else if (action === '小組更新') {
        // 🔄 [location] old ➔ new (task)
        const m = msg.match(/\[(.+?)\]\s*(.+?)\s*[➔→▶]\s*(.+?)\s*[（(]([^)）\s]+)[)）]/);
        if (m) {
            const t = findTeam(state.teams, m[2]);
            if (t) {
                const nm = m[3].split(/[、，]/).map(s => s.trim()).filter(Boolean);
                t.members = nm; t.leader = nm[0]; t.task = m[4];
            }
        }
    } else if (action === 'MAYDAY') {
        state.mayday = !state.mayday;
    } else if (action === '案件結束') {
        state.closed = true;
    }

    return state;
}

function buildSnapshots(evs) {
    _uidCnt = 0;
    let s = { teams: {}, mayday: false, closed: false };
    const snaps = [clone(s)];
    for (const ev of evs) { s = applyEvent(s, ev); snaps.push(clone(s)); }
    return snaps;
}

// ── 偵測所有出現過的位置 ─────────────────
function detectSectors(evs) {
    const seen = new Set();
    for (const ev of evs) {
        for (const m of ev.msg.matchAll(/\[([^\]]+)\]/g)) {
            const loc = m[1];
            if (loc && !/點名|掃碼|已結案/.test(loc)) seen.add(loc);
        }
    }
    return Array.from(seen);
}

function getInsideSectors() {
    const floors = new Set(), basements = new Set();
    for (const loc of allSectors) {
        const mF = loc.match(/^(\d+)F$/);
        const mB = loc.match(/^B(\d+)$/);
        if (mF) floors.add(+mF[1]);
        if (mB) basements.add(+mB[1]);
    }
    const maxF = floors.size ? Math.max(...floors) : 1;
    const maxB = basements.size ? Math.max(...basements) : 0;
    const result = [];
    for (let f = maxF; f >= 1; f--) result.push(f + 'F');
    for (let b = 1; b <= maxB; b++) result.push('B' + b);
    return result.length ? result : ['1F'];
}

// ── 載入 ────────────────────────────────
function loadData() {
    const raw  = document.getElementById('paste-area').value.trim();
    const errEl = document.getElementById('paste-error');
    errEl.classList.add('hidden');
    if (!raw) { showErr('請先貼入試算表資料！'); return; }
    const parsed = parseRaw(raw);
    if (!parsed || !parsed.length) { showErr('無法識別格式，請確認複製的是正確的日誌分頁（需含時間、動作、詳情欄位）。'); return; }

    events     = parsed;
    snapshots  = buildSnapshots(events);
    allSectors = detectSectors(events);

    // 切換畫面
    document.getElementById('paste-view').classList.add('hidden');
    const rv = document.getElementById('replay-view');
    rv.classList.remove('hidden'); rv.classList.add('flex');

    document.getElementById('case-title').textContent = `案件回顧 — ${events.length} 筆事件`;
    document.getElementById('time-range').textContent = `${events[0]?.time} ─ ${events[events.length-1]?.time}`;
    document.getElementById('progress-slider').max = events.length - 1;

    buildTimeline();
    buildMap();
    seekTo(0);
}

function showErr(msg) {
    const e = document.getElementById('paste-error');
    e.textContent = msg; e.classList.remove('hidden');
}

function resetToInput() {
    stopPlay();
    document.getElementById('replay-view').classList.add('hidden');
    document.getElementById('replay-view').classList.remove('flex');
    document.getElementById('paste-view').classList.remove('hidden');
    document.body.classList.remove('mayday-active');
}

// ── 時間軸 DOM ───────────────────────────
function buildTimeline() {
    const list = document.getElementById('timeline-list');
    list.innerHTML = '';
    events.forEach((ev, i) => {
        const div = document.createElement('div');
        const cls = 'ev-' + ev.action.replace(/\s/g,'_');
        div.id        = 'tl-' + i;
        div.className = `p-2 rounded-xl border-l-2 border-slate-700 bg-slate-800/20 cursor-pointer hover:bg-slate-700/40 transition-all ${cls}`;
        div.onclick   = () => { stopPlay(); seekTo(i); };
        const icon    = EV_ICON[ev.action] || '●';
        const clean   = ev.msg.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu,'').trim();
        div.innerHTML = `
            <div class="flex items-start gap-1.5">
                <span class="text-[9px] font-mono text-slate-500 shrink-0 mt-0.5 w-14">${ev.time}</span>
                <div class="min-w-0 flex-1">
                    <span class="text-[10px] font-black text-white">${icon} ${ev.action}</span>
                    <p class="text-[9px] text-slate-400 leading-tight mt-0.5 line-clamp-2">${clean}</p>
                </div>
            </div>`;
        list.appendChild(div);
    });
}

// ── 地圖框架 ─────────────────────────────
function sid(loc) { return 'sec_' + loc.replace(/[^a-zA-Z0-9一-鿿]/g,'_'); }

function sectorClass(loc) {
    if (loc === '待命區')     return 'bg-staging';
    if (loc === 'RIT救援區')  return 'bg-rit';
    if (OUTSIDE_SECS.includes(loc)) return 'bg-outside';
    if (/^B\d+$/.test(loc))  return 'bg-basement';
    return 'bg-inside';
}

function makeSector(loc) {
    const el = document.createElement('div');
    el.id        = sid(loc);
    el.className = `sector-btn ${sectorClass(loc)} w-full`;
    el.innerHTML = `<div class="text-[9px] font-black opacity-40 mb-1">${loc}</div>`;
    return el;
}

function buildMap() {
    const grid  = document.getElementById('map-grid');
    grid.innerHTML = '';
    const inside = getInsideSectors();

    // Row1: 後
    const r1 = document.createElement('div');
    r1.style.cssText = 'grid-column:2;grid-row:1';
    r1.appendChild(makeSector('第三面(後)')); grid.appendChild(r1);

    // Row2: 左 | 建築 | 右
    const r2l = document.createElement('div');
    r2l.style.cssText = 'grid-column:1;grid-row:2;display:flex;align-items:center';
    r2l.appendChild(makeSector('第二面(左)')); grid.appendChild(r2l);

    const r2c = document.createElement('div');
    r2c.style.cssText = 'grid-column:2;grid-row:2;padding:8px;background:rgba(15,23,42,0.3);border-radius:1.5rem;border:1px solid #1e293b;overflow:hidden';
    const ig = document.createElement('div');
    ig.style.cssText = 'display:grid;grid-template-columns:1fr;gap:6px';
    inside.forEach(f => ig.appendChild(makeSector(f)));
    r2c.appendChild(ig); grid.appendChild(r2c);

    const r2r = document.createElement('div');
    r2r.style.cssText = 'grid-column:3;grid-row:2;display:flex;align-items:center';
    r2r.appendChild(makeSector('第四面(右)')); grid.appendChild(r2r);

    // Row3: RIT | 前 | 待命
    const r3l = document.createElement('div');
    r3l.style.cssText = 'grid-column:1;grid-row:3;margin-top:8px;display:flex;align-items:flex-end';
    r3l.appendChild(makeSector('RIT救援區')); grid.appendChild(r3l);

    const r3c = document.createElement('div');
    r3c.style.cssText = 'grid-column:2;grid-row:3;margin-top:8px';
    r3c.appendChild(makeSector('第一面(前)')); grid.appendChild(r3c);

    const r3r = document.createElement('div');
    r3r.style.cssText = 'grid-column:3;grid-row:3;margin-top:8px;display:flex;align-items:flex-end';
    r3r.appendChild(makeSector('待命區')); grid.appendChild(r3r);
}

// ── 渲染地圖狀態 ─────────────────────────
function renderMap(state) {
    // 清除所有 team-card
    document.querySelectorAll('.team-card').forEach(e => e.remove());

    for (const uid in state.teams) {
        const t = state.teams[uid];
        if (!t.active) continue;
        const secEl = document.getElementById(sid(t.location));
        if (!secEl) continue;

        const ts   = TASK_SHORT[t.task] || t.task?.charAt(0) || '?';
        const airV = t.air;
        const airColor = airV === null || airV === undefined ? 'text-slate-500'
                       : airV <= 50  ? 'text-red-400 font-black'
                       : airV <= 100 ? 'text-orange-400 font-black'
                       : 'text-emerald-400';
        const airText = airV !== null && airV !== undefined ? `<span class="font-mono text-xs ${airColor}">${airV}b</span>` : '';
        const extras  = t.members.slice(1).join('、');

        const card = document.createElement('div');
        card.className = 'team-card';
        card.innerHTML = `<span class="task-tag task-${ts}">${ts}</span><span class="text-white font-black text-xs">${t.leader}</span> ${airText}${extras ? `<div class="text-[9px] text-slate-400 mt-0.5 truncate">${extras}</div>` : ''}`;
        secEl.appendChild(card);
    }

    // MAYDAY
    if (state.mayday) {
        document.body.classList.add('mayday-active');
        document.getElementById('mayday-banner').classList.remove('hidden');
    } else {
        document.body.classList.remove('mayday-active');
        document.getElementById('mayday-banner').classList.add('hidden');
    }
}

// ── 統計數字 ─────────────────────────────
function renderStats(ev, state) {
    const active = Object.values(state.teams).filter(t => t.active);
    const total    = ev?.total    || active.reduce((s,t) => s + t.members.length, 0);
    const standby  = ev?.standby  || active.filter(t => t.location === '待命區').reduce((s,t) => s + t.members.length, 0);
    const deployed = ev?.deployed || (total - standby);
    document.getElementById('stat-total').textContent    = total;
    document.getElementById('stat-standby').textContent  = standby;
    document.getElementById('stat-deployed').textContent = deployed;
}

// ── 播放控制 ─────────────────────────────
function seekTo(idx) {
    idx = Math.max(0, Math.min(events.length - 1, idx));
    currentIdx = idx;
    const state = snapshots[idx + 1];
    const ev    = events[idx];
    renderMap(state);
    renderStats(ev, state);
    highlightTl(idx);
    updateCtrl(idx);
    if (['MAYDAY','緊急回撤','氣量警告'].includes(ev?.action)) beep(ev.action === '緊急回撤' ? 440 : 880, 0.3);
}

function highlightTl(idx) {
    document.querySelectorAll('#timeline-list > div').forEach((el, i) => {
        if (i === idx) { el.classList.add('ev-current'); el.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
        else            el.classList.remove('ev-current');
    });
}

function updateCtrl(idx) {
    const slider = document.getElementById('progress-slider');
    slider.value = idx;
    document.getElementById('current-time').textContent        = events[idx]?.time || '--:--:--';
    document.getElementById('event-index-display').textContent = `${idx+1} / ${events.length}`;
    document.getElementById('event-counter').textContent       = `${idx+1} / ${events.length}`;
}

function togglePlay() { isPlaying ? stopPlay() : startPlay(); }

function startPlay() {
    if (currentIdx >= events.length - 1) seekTo(0);
    isPlaying = true;
    document.getElementById('play-btn').textContent = '⏸';
    scheduleNext();
}

function stopPlay() {
    isPlaying = false;
    document.getElementById('play-btn').textContent = '▶';
    clearTimeout(playTimer);
}

function scheduleNext() {
    if (!isPlaying) return;
    playTimer = setTimeout(() => {
        if (currentIdx < events.length - 1) { seekTo(currentIdx + 1); scheduleNext(); }
        else stopPlay();
    }, Math.max(80, 700 / playSpeed));
}

function stepForward() { stopPlay(); if (currentIdx < events.length-1) seekTo(currentIdx+1); }
function stepBack()    { stopPlay(); if (currentIdx > 0) seekTo(currentIdx-1); }
function goToStart()   { stopPlay(); seekTo(0); }
function goToEnd()     { stopPlay(); seekTo(events.length-1); }

function setSpeed(s) {
    playSpeed = s;
    [1,2,5,10].forEach(v => document.getElementById(`spd-${v}`)?.classList.toggle('active', v===s));
}

// 鍵盤快速鍵（平板外接鍵盤用）
document.addEventListener('keydown', e => {
    if (['INPUT','TEXTAREA'].includes(e.target.tagName)) return;
    if (e.code === 'Space')       { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight')  stepForward();
    if (e.code === 'ArrowLeft')   stepBack();
    if (e.code === 'Home')        goToStart();
    if (e.code === 'End')         goToEnd();
});
</script>
